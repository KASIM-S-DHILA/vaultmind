<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .splash {
      width: 420px;
      height: 300px;
      background: linear-gradient(145deg, #111218, #191c27);
      border: 1px solid rgba(109, 93, 252, 0.3);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
      padding: 0 40px;
    }
    .logo { font-size: 42px; }
    .title { font-size: 22px; font-weight: 700; color: #e4e5f0; letter-spacing: -0.5px; }
    .badge {
      font-size: 10px; padding: 2px 10px; background: rgba(109,93,252,0.15);
      border: 1px solid rgba(109,93,252,0.3); border-radius: 999px;
      color: #8b7dfd; letter-spacing: 0.3px;
    }
    .status-text { font-size: 12px; color: #8b8fa8; text-align: center; min-height: 18px; }
    .progress-track {
      width: 100%; height: 4px; background: rgba(255,255,255,0.06);
      border-radius: 2px; overflow: hidden; margin-top: 4px;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6d5dfc, #a78bfa);
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .dots { display: flex; gap: 6px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #6d5dfc;
      animation: bounce 1.2s ease infinite;
      opacity: 0.4;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">⚖️</div>
    <div class="title">VaultMind</div>
    <div class="badge">🔒 Local AI · 100% Private</div>
    <div class="status-text" id="statusText">Loading your confidential AI assistant…</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <script>
    if (window.vaultmindSplash) {
      window.vaultmindSplash.onStatus(function(data) {
        document.getElementById('statusText').textContent = data.message || 'Loading…';
        if (data.progress !== undefined) {
          document.getElementById('progressFill').style.width = data.progress + '%';
        }
      });
    }
  </script>
</body>
</html>
